<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Care Bears Grid Perfect</title>
  </head>
  <body>
    <div class="grid-container">
      <section class="gallery-item item-title">
        <h1>Care Bears</h1>
      </section>
      <section class="gallery-item item-1">
        <img src="img/chhau-dance.jpg" alt="Banner superior derecho" />
      </section>

      <section class="gallery-item item-2">
        <img src="img/wooden-masks.jpg" alt="Imagen 2 - Funko Rosa" />
      </section>
      <section class="gallery-item item-3">
        <img src="img/kathakali-statue.jpg" alt="Imagen 3 - Funko Verde" />
      </section>
      <section class="gallery-item item-4">
        <img src="img/barong-dance.jpg" alt="Imagen 4 - Funko Amarillo" />
      </section>

      <section class="gallery-item item-poster">
        <img src="img/animal-masks.jpg" alt="Póster Central" />
      </section>

      <section class="gallery-item item-5">
        <img src="img/ethnic-child.jpg" alt="Banner horizontal arcoíris" />
      </section>
      <section class="gallery-item item-6">
        <img src="img/abstract-art.jpg" alt="Imagen 6 - Funko Azul" />
      </section>

      <section class="gallery-item item-7">
        <img src="img/kabuki-actors.jpg" alt="Imagen 7 - Funko Dormilón" />
      </section>
      <section class="gallery-item item-8">
        <img src="img/desert-camel.jpg" alt="Imagen 8 - Funko Amoroso" />
      </section>
      <section class="gallery-item item-9">
        <img src="img/ganesha-statue.jpg" alt="Imagen 9 - Banner Amor Total" />
      </section>
    </div>
  </body>
</html>
