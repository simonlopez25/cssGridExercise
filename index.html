<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Care Bears Grid Perfect</title>
  </head>
  <body>
    <div class="grid-container">
      <section class="gallery-item item-title">
        <h1>Care Bears</h1>
      </section>

      <section class="gallery-item item-1">
        <img
          src="img/traditional-painting.png"
          alt="A detailed traditional painting depicting figures, cattle, and peacocks in a lush forest under a dark sky"
        />
      </section>

      <section class="gallery-item item-2">
        <img
          src="img/shadow-puppets-pattern.jpg"
          alt="A beige textile pattern featuring intricate rows of traditional shadow puppet figures and decorative floral elements"
        />
      </section>

      <section class="gallery-item item-3">
        <img
          src="img/geometric-batik-pattern.jpg"
          alt="A symmetrical batik fabric design with dark brown geometric shapes and wavy linework"
        />
      </section>

      <section class="gallery-item item-4">
        <img
          src="img/urban-graffiti.jpg"
          alt="Vibrant street art mural featuring stylized large-scale portraits painted on a brick wall"
        />
      </section>

      <section class="gallery-item item-poster">
        <img
          src="img/barong-dance.jpg"
          alt="Dynamic performance of traditional dancers in elaborate red and gold costumes with ceremonial masks"
        />
      </section>

      <section class="gallery-item item-5">
        <img
          src="img/tribal-warrior.jpg"
          alt="A person in traditional ceremonial attire with headfeathers sitting inside a wooden structure holding weapons"
        />
      </section>

      <section class="gallery-item item-6">
        <img
          src="img/street-market-cart.jpg"
          alt="An old wooden street vending cart equipped with a balance scale parked in a narrow alleyway"
        />
      </section>

      <section class="gallery-item item-7">
        <img
          src="img/bw-portrait.jpg"
          alt="A close-up black and white portrait capturing an emotional and tender embrace between two individuals"
        />
      </section>

      <section class="gallery-item item-8">
        <img
          src="img/garuda-bird-pattern.jpg"
          alt="Intricate dark blue and brown batik fabric adorned with traditional patterns and stylized bird motifs"
        />
      </section>

      <section class="gallery-item item-9">
        <img
          src="img/woven-basket-carrier.jpg"
          alt="A person carrying a large, traditional woven wicker basket on their back in an outdoor setting"
        />
      </section>
    </div>
  </body>
</html>
